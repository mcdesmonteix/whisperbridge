<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperBridge</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon_32x32.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>

  <!-- Fond dégradé thème Glass -->
  <div id="glass-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <!-- ── Écran de connexion ── -->
  <div id="screen-select">
    <div class="select-card">
      <div class="app-logo"><img src="/static/logo.png?v=2" alt="WhisperBridge" /></div>
      <h1>WhisperBridge</h1>
      <p id="room-label">Entre ton prénom et ta langue</p>

      <div class="form-group">
        <input id="input-name" type="text" placeholder="Ton prénom" maxlength="20" autocomplete="off"
          onkeydown="if(event.key==='Enter') connectUser()" />
      </div>

      <div class="form-group">
        <select id="select-lang">
          <option value="fr">🇫🇷 Français</option>
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 中文 (Mandarin)</option>
          <option value="ar">🇸🇦 العربية (Arabe)</option>
          <option value="ru">🇷🇺 Русский (Russe)</option>
          <option value="es">🇪🇸 Español</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="pt">🇵🇹 Português</option>
        </select>
      </div>

      <button class="btn-join" onclick="connectUser()" id="btn-join">Rejoindre →</button>

      <div class="theme-picker-label">Choisir un thème</div>
      <div class="theme-picker">
        <div class="theme-swatch" data-theme="glass"   data-label="Glass"    onclick="setTheme('glass')"   title="Glassmorphism"></div>
        <div class="theme-swatch" data-theme="dark"    data-label="Dark"     onclick="setTheme('dark')"    title="Dark mode"></div>
        <div class="theme-swatch" data-theme="minimal" data-label="Minimal"  onclick="setTheme('minimal')" title="Minimaliste"></div>
        <div class="theme-swatch" data-theme="vivid"   data-label="Vivid"    onclick="setTheme('vivid')"   title="Coloré"></div>
      </div>
    </div>
  </div>

  <!-- ── Écran de conversation ── -->
  <div id="screen-chat" class="hidden">
    <header>
      <div class="header-left">
        <div class="header-logo-box"><img src="/static/logo.png?v=2" alt="WhisperBridge" /></div>
        <div class="header-title">WhisperBridge</div>
      </div>
      <div class="header-right">
        <div id="header-users" class="header-users"></div>
        <div style="position:relative;">
          <button id="btn-theme" onclick="toggleThemeDropdown()" title="Changer de thème">🎨</button>
          <div class="theme-dropdown hidden" id="theme-dropdown">
            <div class="theme-swatch" data-theme="glass"   onclick="setTheme('glass');closeThemeDropdown()"   title="Glass"></div>
            <div class="theme-swatch" data-theme="dark"    onclick="setTheme('dark');closeThemeDropdown()"    title="Dark"></div>
            <div class="theme-swatch" data-theme="minimal" onclick="setTheme('minimal');closeThemeDropdown()" title="Minimal"></div>
            <div class="theme-swatch" data-theme="vivid"   onclick="setTheme('vivid');closeThemeDropdown()"   title="Vivid"></div>
          </div>
        </div>
      </div>
    </header>

    <div id="messages"></div>

    <footer>
      <div id="recording-indicator" class="hidden">🎙️ Enregistrement…</div>
      <div id="vad-listening" class="hidden">👂 En écoute…</div>
      <div id="pause-indicator" class="hidden">⏸️ Traduction en pause</div>
      <div class="footer-controls">
        <button id="btn-vad" onclick="toggleVAD()" title="Détection automatique de la voix">🤖</button>
        <button id="btn-mic"
          onmousedown="startRecording()"
          onmouseup="stopRecording()"
          ontouchstart="startRecording()"
          ontouchend="stopRecording()">🎤</button>
        <button id="btn-tts" onclick="toggleTTS()" title="Lecture vocale">🔊</button>
        <button id="btn-pause" onclick="togglePause()" title="Mettre en pause la traduction">⏸️</button>
      </div>
      <div class="footer-hint">🤖 Auto · 🎤 Maintenir pour parler · 🔊 Lecture vocale · ⏸️ Pause</div>
      <div class="footer-hint" style="margin-top:4px">
        <button id="btn-share" onclick="shareRoom()" title="Partager le lien de cette conversation">🔗 Partager le lien</button>
      </div>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
