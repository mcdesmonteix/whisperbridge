<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 Projet Olivia</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Écran de connexion -->
  <div id="screen-select">
    <div class="select-card">
      <div class="app-logo">🌍</div>
      <h1>Projet Olivia</h1>
      <p>Entre ton prénom et ta langue</p>

      <div class="form-group">
        <input id="input-name" type="text" placeholder="Ton prénom" maxlength="20" autocomplete="off"
          onkeydown="if(event.key==='Enter') connectUser()" />
      </div>

      <div class="form-group">
        <select id="select-lang">
          <option value="fr">🇫🇷 Français</option>
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 中文 (Mandarin)</option>
          <option value="ar">🇸🇦 العربية (Arabe)</option>
          <option value="ru">🇷🇺 Русский (Russe)</option>
          <option value="es">🇪🇸 Español</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="pt">🇵🇹 Português</option>
        </select>
      </div>

      <button class="btn-join" onclick="connectUser()">Rejoindre →</button>
    </div>
  </div>

  <!-- Écran de conversation -->
  <div id="screen-chat" class="hidden">
    <header>
      <div class="header-title">🌍 Projet Olivia</div>
      <div id="header-users" class="header-users"></div>
    </header>

    <div id="messages"></div>

    <footer>
      <div id="recording-indicator" class="hidden">🎙️ Enregistrement…</div>
      <div id="vad-listening" class="hidden">👂 En écoute…</div>
      <div class="footer-controls">
        <button id="btn-vad" onclick="toggleVAD()" title="Activer la détection automatique">
          🤖
        </button>
        <button id="btn-mic"
          onmousedown="startRecording()"
          onmouseup="stopRecording()"
          ontouchstart="startRecording()"
          ontouchend="stopRecording()">
          🎤
        </button>
        <button id="btn-tts" onclick="toggleTTS()" title="Activer/désactiver la lecture vocale">
          🔊
        </button>
      </div>
      <div class="footer-hint">🤖 Auto · 🎤 Maintenir pour parler · 🔊 Lecture vocale</div>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
